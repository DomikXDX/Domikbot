<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DomikBot Control Panel</title>
    <style>
        :root {
            --bg: #0f172a;
            --sidebar: #1e293b;
            --accent: #6366f1;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; }

        /* Левая панель */
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid rgba(255,255,255,0.1); padding: 20px; display: flex; flex-direction: column; }
        
        /* Стили кнопок и ссылок */
        .nav-link { display: block; padding: 15px; margin-bottom: 10px; background: var(--glass); border-radius: 12px; color: #cbd5e1; text-decoration: none; transition: 0.3s; cursor: pointer; border: none; width: 100%; text-align: left; font-size: 16px; }
        .nav-link:hover { background: var(--accent); color: white; }

        /* Основной контент */
        .main { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .hub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; margin-top: 30px; }
        .app-card { background: var(--glass); padding: 20px; border-radius: 20px; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .app-card:hover { background: var(--accent); transform: translateY(-5px); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color: #6366f1;">DomikBot</h2>
        <div style="flex-grow: 1;">
            <!-- Исправленные кнопки навигации -->
            <a href="/settings-commands" class="nav-link">💬 Команды</a>
            <a href="/settings-timers" class="nav-link">📢 Таймеры</a>
            <a href="#hub" class="nav-link">🧩 Хаб приложений</a>
        </div>
        <!-- Исправленная кнопка выхода -->
        <button class="nav-link" style="background: #991b1b; color: white;" onclick="logout()">Выход</button>
    </div>

    <div class="main">
        <h3>Хаб приложений</h3>
        <div class="hub-grid">
            <!-- Пример: все ваши приложения -->
            <div class="app-card" onclick="window.location.href='https://domikxdx.github.io/Domikbot/giveway'">
                <div style="font-size: 30px;">🎁</div><div>Giveaway</div>
            </div>
            <div class="app-card" onclick="window.location.href='https://domikxdx.github.io/Domikbot/chat-quiz'">
                <div style="font-size: 30px;">💬</div><div>Chat Quiz</div>
            </div>
            <!-- Вставьте сюда остальные приложения -->
        </div>
    </div>

    <script>
        // Функция выхода
        function logout() {
            localStorage.removeItem('twitch_token');
            // Перезагрузка страницы принудительно вернет пользователя на экран входа (если он настроен)
            window.location.href = window.location.origin + window.location.pathname;
        }
    </script>
</body>
</html>
