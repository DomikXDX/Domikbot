<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PluSMusic & DomikBot</title>
    <!-- Подключаем библиотеку Twitch-бота прямо в браузер -->
    <script src="https://bundle.run/tmi.js@1.8.5"></script>
    <style>
        /* Базовые стили для темной темы с переливающейся радугой */
        :root {
            --bg-color: #0b0b0e;
            --panel-bg: #141419;
            --text-color: #efeff1;
            --text-muted: #adadb8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Эффект переливающейся радужной границы */
        .rainbow-panel {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 600px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .rainbow-panel::before {
            content: '';
            position: absolute;
            top: -3px; left: -3px; bottom: -3px; right: -3px;
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%;
            z-index: -1;
            border-radius: 19px;
            animation: blowing-rainbow 20s linear infinite;
            filter: blur(2px);
        }

        @keyframes blowing-rainbow {
            0% { background-position: 0 0; }
            50% { background-position: 400% 0; }
            100% { background-position: 0 0; }
        }

        h1, h2 { margin-top: 0; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .status-container { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        .status-offline { background-color: #eb0400; }
        .status-online { background-color: #00f721; color: #000; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 14px; }
        input, textarea {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #3a3a44;
            background-color: #1f1f23; color: #fff; box-sizing: border-box; font-size: 15px;
        }
        input:focus, textarea:focus { outline: none; border-color: #a970ff; }

        button {
            background-color: #9146ff; color: white; border: none; padding: 12px 20px;
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px;
            transition: background 0.2s;
        }
        button:hover { background-color: #772ce8; }
        
        .bot-logs {
            background: #000; color: #00ff66; font-family: monospace; 
            padding: 10px; height: 120px; overflow-y: auto; border-radius: 8px;
            margin-top: 15px; font-size: 13px; border: 1px solid #222;
        }
    </style>
</head>
<body>

    <div class="rainbow-panel">
        <h1>DomikBot Панель управления</h1>
        
        <div class="status-container">
            <span>Статус бота:</span>
            <div id="bot-status" class="status-badge status-offline">ВЫКЛЮЧЕН</div>
        </div>

        <!-- Настройки подключения -->
        <div class="form-group">
            <label for="target-channel">Канал Twitch (куда зайдет бот):</label>
            <input type="text" id="target-channel" placeholder="Например: dmitry_lixxx">
        </div>

        <div class="form-group">
            <label for="bot-oauth">Твой OAuth токен (с сайта twitchapps.com/tmi/):</label>
            <input type="password" id="bot-oauth" placeholder="oauth:xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
        </div>

        <!-- Настройки триггеров -->
        <div class="form-group">
            <label for="bot-commands">Команды чата (Формат JSON: {"!привет": "Привет, бро!", "!вк": "vk.com/..."})</label>
            <textarea id="bot-commands" rows="3" placeholder='{"!ping": "pong!"}'></textarea>
        </div>

        <!-- Настройки таймера объявлений -->
        <div class="form-group">
            <label for="bot-announcements">Таймер-объявления (по одному в строке):</label>
            <textarea id="bot-announcements" rows="3" placeholder="Подписывайтесь на мой ТГ!&#10;Ставьте лайки!"></textarea>
        </div>

        <div class="form-group">
            <label for="bot-interval">Интервал отправки объявлений (в минутах):</label>
            <input type="number" id="bot-interval" value="10" min="1">
        </div>

        <button onclick="saveAndStartBot()">Сохранить настройки и Запустить бота</button>

        <h2>Логи работы бота:</h2>
        <div id="bot-logs" class="bot-logs">Ожидание запуска...</div>
    </div>

    <script>
        let client = null;
        let announcementInterval = null;
        let currentAnnouncementIndex = 0;

        // Загрузка настроек из памяти браузера при открытии страницы
        window.onload = function() {
            if(localStorage.getItem('domik_bot_channel')) {
                document.getElementById('target-channel').value = localStorage.getItem('domik_bot_channel') || '';
                document.getElementById('bot-oauth').value = localStorage.getItem('domik_bot_oauth') || '';
                document.getElementById('bot-commands').value = localStorage.getItem('domik_bot_commands') || '{"!ping": "pong!"}';
                document.getElementById('bot-announcements').value = localStorage.getItem('domik_bot_announcements') || '';
                document.getElementById('bot-interval').value = localStorage.getItem('domik_bot_interval') || '10';
                
                logMessage("Настройки успешно загружены из памяти браузера.");
            }
        };

        function logMessage(text) {
            const logsDiv = document.getElementById('bot-logs');
            const time = new Date().toLocaleTimeString();
            logsDiv.innerHTML += `[${time}] ${text}<br>`;
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        function saveAndStartBot() {
            // 1. Собираем и сохраняем данные в localStorage
            const channel = document.getElementById('target-channel').value.trim().toLowerCase();
            const oauth = document.getElementById('bot-oauth').value.trim();
            const commandsText = document.getElementById('bot-commands').value.trim();
            const announcementsText = document.getElementById('bot-announcements').value.trim();
            const interval = parseInt(document.getElementById('bot-interval').value) || 10;

            if (!channel || !oauth) {
                alert("Пожалуйста, заполни имя канала и OAuth токен!");
                return;
            }

            let commands = {};
            try {
                commands = JSON.parse(commandsText);
            } catch(e) {
                alert("Ошибка в формате JSON команд! Проверь кавычки и запятые.");
                return;
            }

            localStorage.setItem('domik_bot_channel', channel);
            localStorage.setItem('domik_bot_oauth', oauth);
            localStorage.setItem('domik_bot_commands', commandsText);
            localStorage.setItem('domik_bot_announcements', announcementsText);
            localStorage.setItem('domik_bot_interval', interval);

            logMessage("Настройки сохранены локально.");

            // 2. Перезапускаем подключение бота
            if (client) {
                logMessage("Переподключение бота...");
                client.disconnect();
            }

            if (announcementInterval) clearInterval(announcementInterval);

            // Инициализация tmi.js прямо в браузере
            client = new tmi.Client({
                options: { debug: false },
                identity: {
                    username: channel, // Используем имя канала как имя бота для простоты
                    password: oauth
                },
                channels: [channel]
            });

            // Обработка входящих сообщений
            client.on('message', (ch, tags, message, self) => {
                if (self) return;

                const cleanMsg = message.trim();
                if (commands[cleanMsg]) {
                    client.say(ch, `@${tags.username}, ${commands[cleanMsg]}`)
                        .then(() => logMessage(`Ответил командой на сообщение от ${tags.username}`))
                        .catch(err => logMessage(`Ошибка отправки: ${err}`));
                }
            });

            // Обработка успешного подключения
            client.on('connected', () => {
                logMessage(`Успешно подключились к чату: #${channel}`);
                const statusBadge = document.getElementById('bot-status');
                statusBadge.innerText = "В СЕТИ";
                statusBadge.className = "status-badge status-online";

                // Запуск таймера объявлений
                startAnnouncements(channel, announcementsText, interval);
            });

            client.on('disconnected', () => {
                const statusBadge = document.getElementById('bot-status');
                statusBadge.innerText = "ВЫКЛЮЧЕН";
                statusBadge.className = "status-badge status-offline";
            });

            client.connect().catch(err => logMessage(`Ошибка подключения: ${err}`));
        }

        function startAnnouncements(channel, text, minutes) {
            const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            if (lines.length === 0) return;

            currentAnnouncementIndex = 0;
            const ms = minutes * 60 * 1000;

            logMessage(`Запущен таймер объявлений (раз в ${minutes} мин., всего фраз: ${lines.length})`);

            announcementInterval = setInterval(() => {
                if (!client) return;
                
                const phrase = lines[currentAnnouncementIndex];
                client.say(`#${channel}`, phrase)
                    .then(() => {
                        logMessage(`[Таймер] Отправлено: ${phrase}`);
                        currentAnnouncementIndex = (currentAnnouncementIndex + 1) % lines.length;
                    })
                    .catch(err => logMessage(`[Таймер] Ошибка отправки: ${err}`));

            }, ms);
        }
    </script>
</body>
</html>
