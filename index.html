<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DomikBot - Панель управления</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #09090b;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --glass-bg: rgba(24, 24, 27, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #9146FF;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 15% 50%, rgba(145, 70, 255, 0.05), transparent 25%);
        }
        .sidebar {
            width: 280px; background: var(--glass-bg); backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border); padding: 30px 20px;
            display: flex; flex-direction: column; gap: 15px;
        }
        .sidebar h2 { margin-bottom: 40px; text-align: center; font-weight: 800; letter-spacing: -1px; }
        .tab-btn {
            background: transparent; border: 1px solid transparent; color: var(--text-muted);
            font-size: 1rem; font-weight: 600; text-align: left; cursor: pointer;
            padding: 16px 20px; border-radius: 12px; transition: all 0.3s;
        }
        .tab-btn:hover { background: rgba(255,255,255,0.03); color: var(--text-main); }
        .tab-btn.active { background: rgba(145, 70, 255, 0.15); border: 1px solid rgba(145, 70, 255, 0.3); color: #fff; }
        
        .content { flex: 1; padding: 50px; overflow-y: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        h1 { font-weight: 800; margin-top: 0; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 25px; display: flex; gap: 15px; }
        input {
            background: #18181b; border: 1px solid var(--glass-border);
            color: white; padding: 14px 18px; border-radius: 10px; font-size: 1rem; outline: none; flex: 1;
        }
        input:focus { border-color: var(--accent); }
        
        .btn {
            background: var(--accent); color: white; border: none; padding: 14px 28px;
            border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-danger { background: #ef4444; padding: 8px 16px; font-size: 0.9rem; }
        
        .item-list { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        .item-row {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            padding: 18px 24px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center;
        }
        .item-info strong { color: var(--accent); margin-right: 10px; font-size: 1.1rem; }
        
        .save-bar {
            margin-top: 50px; border-top: 1px solid var(--glass-border); padding-top: 25px; display: flex; justify-content: flex-end;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>DomikBot Panel</h2>
        <button class="tab-btn active" onclick="switchTab('tab-commands', this)">💬 Чат-Команды</button>
        <button class="tab-btn" onclick="switchTab('tab-timers', this)">📢 Объявления (Таймеры)</button>
    </div>
    
    <div class="content">
        <div id="tab-commands" class="tab-content active">
            <h1>Управление командами чата</h1>
            <div class="form-group">
                <input type="text" id="cmd-name" placeholder="Пример: !vk" style="max-width: 200px;">
                <input type="text" id="cmd-response" placeholder="Что должен ответить бот...">
                <button class="btn" onclick="addCommand()">Добавить команду</button>
            </div>
            <div class="item-list" id="commands-list"></div>
        </div>

        <div id="tab-timers" class="tab-content">
            <h1>Автоматические объявления</h1>
            <div class="form-group" style="align-items: center; background: var(--glass-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--glass-border);">
                <label style="color: var(--text-muted); font-weight: 600;">Подавать объявление каждые (минут):</label>
                <input type="number" id="timer-interval" style="max-width: 90px; text-align: center; margin-left: 15px;" min="1" value="10">
            </div>
            <div class="form-group">
                <input type="text" id="timer-text" placeholder="Текст периодического уведомления в чат...">
                <button class="btn" onclick="addTimer()">Добавить текст</button>
            </div>
            <div class="item-list" id="timers-list"></div>
        </div>

        <div class="save-bar">
            <button class="btn" style="background: #10b981; padding: 16px 36px; font-size: 1.1rem;" onclick="saveConfig()">Сохранить настройки бота</button>
        </div>
    </div>

    <script>
        // Адрес локального бота на твоем ПК
        const BACKEND_URL = 'http://localhost:3000';
        let localConfig = { commands: {}, announcements: [], interval: 10 };

        async function loadConfig() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/config`);
                localConfig = await res.json();
                document.getElementById('timer-interval').value = localConfig.interval || 10;
                renderCommands();
                renderTimers();
            } catch (e) {
                alert("Не удалось подключиться к боту! Убедись, что на компе запущен start.bat");
            }
        }

        function renderCommands() {
            const container = document.getElementById('commands-list');
            container.innerHTML = '';
            for (const [cmd, resp] of Object.entries(localConfig.commands)) {
                container.innerHTML += `
                    <div class="item-row">
                        <div class="item-info"><strong>${cmd}</strong> — ${resp}</div>
                        <button class="btn btn-danger" onclick="deleteCommand('${cmd}')">Удалить</button>
                    </div>
                `;
            }
        }

        function renderTimers() {
            const container = document.getElementById('timers-list');
            container.innerHTML = '';
            localConfig.announcements.forEach((text, index) => {
                container.innerHTML += `
                    <div class="item-row">
                        <div class="item-info">${text}</div>
                        <button class="btn btn-danger" onclick="deleteTimer(${index})">Удалить</button>
                    </div>
                `;
            });
        }

        function addCommand() {
            const name = document.getElementById('cmd-name').value.trim();
            const resp = document.getElementById('cmd-response').value.trim();
            if(!name || !resp) return alert("Заполните оба поля!");
            if(!name.startsWith('!')) return alert("Команда должна начинаться с !");
            localConfig.commands[name] = resp;
            document.getElementById('cmd-name').value = '';
            document.getElementById('cmd-response').value = '';
            renderCommands();
        }

        function deleteCommand(cmd) {
            delete localConfig.commands[cmd];
            renderCommands();
        }

        function addTimer() {
            const text = document.getElementById('timer-text').value.trim();
            if(!text) return alert("Введите текст!");
            localConfig.announcements.push(text);
            document.getElementById('timer-text').value = '';
            renderTimers();
        }

        function deleteTimer(index) {
            localConfig.announcements.splice(index, 1);
            renderTimers();
        }

        async function saveConfig() {
            localConfig.interval = parseInt(document.getElementById('timer-interval').value) || 10;
            try {
                const res = await fetch(`${BACKEND_URL}/api/config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(localConfig)
                });
                if (res.ok) alert("Готово! Настройки улетели в твое локальное черное окошко.");
                else alert("Ошибка сервера.");
            } catch (e) {
                alert("Ошибка связи с локальным ботом.");
            }
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        window.onload = loadConfig;
    </script>
</body>
</html>
