<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DomikBot - Панель управления</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #09090b;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --glass-bg: rgba(24, 24, 27, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #9146FF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(145, 70, 255, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 255, 204, 0.05), transparent 25%);
        }

        .screen {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: none;
            justify-content: center; align-items: center;
        }

        .active-screen { display: flex; }

        .split-container { display: flex; width: 100%; height: 100%; }

        .left-side, .right-side {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1), opacity 1s ease;
        }

        .title { 
            font-size: 5.5rem; font-weight: 800; margin: 0; letter-spacing: -2px;
            background: linear-gradient(135deg, #fff, #a1a1aa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        .subtitle { 
            font-size: 1.2rem; color: var(--text-muted); margin-top: -5px; 
            font-weight: 400; letter-spacing: 2px; text-transform: uppercase;
        }

        .rainbow-text {
            background: linear-gradient(270deg, #ff0055, #ffaa00, #00ffaa, #00aaff, #aa00ff, #ff0055);
            background-size: 400% 400%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: rainbow-shift 6s ease-in-out infinite;
            font-size: 4.5rem; font-weight: 800; text-align: center;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
        }

        @keyframes rainbow-shift { 
            0% { background-position: 0% 50% } 
            50% { background-position: 100% 50% } 
            100% { background-position: 0% 50% } 
        }

        .btn {
            position: relative; padding: 16px 48px; font-size: 1.2rem;
            font-weight: 600; font-family: inherit; cursor: pointer;
            background: var(--glass-bg); color: #fff; border: 1px solid var(--glass-border);
            border-radius: 12px; backdrop-filter: blur(10px); transition: all 0.3s ease;
            overflow: hidden; z-index: 1;
        }

        .btn::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(270deg, #ff0055, #ffaa00, #00ffaa, #00aaff, #aa00ff);
            background-size: 300% 300%; animation: rainbow-shift 4s ease infinite;
            z-index: -1; opacity: 0; transition: opacity 0.3s ease;
        }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); border-color: transparent; }
        .btn:hover::before { opacity: 1; }

        .theme-select {
            padding: 12px 20px; font-size: 1rem; margin-bottom: 30px;
            border-radius: 10px; border: 1px solid var(--glass-border);
            background: var(--glass-bg); color: var(--text-main);
            backdrop-filter: blur(10px); font-family: inherit; outline: none; cursor: pointer;
        }

        .theme-select option { background: #18181b; }

        .slide-left { transform: translateX(-100vw); opacity: 0; }
        .slide-right { transform: translateX(100vw); opacity: 0; }

        #dashboard { display: none; flex-direction: row; height: 100vh; width: 100vw; }

        .sidebar {
            width: 260px; background: var(--glass-bg); backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border); padding: 30px 20px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .sidebar h2 { margin-bottom: 40px; text-align: center; color: var(--text-main); font-weight: 800; letter-spacing: 1px; }

        .tab-btn {
            background: transparent; border: 1px solid transparent; color: var(--text-muted);
            font-size: 1rem; font-weight: 600; text-align: left; cursor: pointer;
            padding: 16px 20px; border-radius: 12px; transition: all 0.3s; font-family: inherit;
        }
        .tab-btn:hover { background: rgba(255,255,255,0.03); color: var(--text-main); }
        .tab-btn.active {
            background: rgba(145, 70, 255, 0.15); border: 1px solid rgba(145, 70, 255, 0.3);
            color: #fff; box-shadow: inset 0 0 20px rgba(145, 70, 255, 0.1);
        }

        .content { flex: 1; padding: 50px; overflow-y: auto; }
        .tab-content { display: none; animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .tab-content.active { display: block; }
        
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-weight: 800; margin-top: 0; }

        .tiles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 30px; }
        .tile {
            background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(10px);
            height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; font-weight: 600; font-size: 0.95rem; border-radius: 16px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); padding: 15px; position: relative; overflow: hidden;
        }
        .tile::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 4px;
            background: var(--accent); transition: height 0.3s ease, background 0.3s ease; z-index: 0; opacity: 0.7;
        }
        .tile:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        .tile:hover::after { height: 100%; opacity: 0.1; }
        .tile span { z-index: 1; }
        .tile i { font-size: 2.5rem; margin-bottom: 15px; display: block; z-index: 1; color: var(--text-muted); transition: color 0.3s; font-style: normal; }
        .tile:hover i { color: var(--text-main); }
        .tile:nth-child(2n)::after { background: #3b82f6; }
        .tile:nth-child(3n)::after { background: #10b981; }
        .tile:nth-child(5n)::after { background: #f59e0b; }
        .tile:nth-child(7n)::after { background: #ec4899; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
    </style>
</head>
<body>

    <!-- Экран 1: Вход -->
    <div id="screen-login" class="screen active-screen">
        <div class="split-container">
            <div class="left-side">
                <h1 class="title">DomikBot</h1>
                <p class="subtitle">Лучший бот для Twitch</p>
            </div>
            <div class="right-side">
                <button class="btn" onclick="loginWithTwitch()">Вход по Twitch</button>
            </div>
        </div>
    </div>

    <!-- Экран 2: Приветствие -->
    <div id="screen-welcome" class="screen">
        <div class="split-container">
            <div id="welcome-left" class="left-side">
                <div class="rainbow-text" id="welcome-name">Привет, Загрузка...</div>
            </div>
            <div id="welcome-right" class="right-side">
                <select class="theme-select">
                    <option value="dark">Темная тема (Выбрана)</option>
                    <option value="light" disabled>Светлая (В разработке)</option>
                </select>
                <button class="btn" onclick="goToDashboard()">Продолжить</button>
            </div>
        </div>
    </div>

    <!-- Экран 3: Дашборд -->
    <div id="dashboard">
        <div class="sidebar">
            <h2>DomikBot</h2>
            <button class="tab-btn active" onclick="switchTab('tab-settings', this)">Настройка бота</button>
            <button class="tab-btn" onclick="switchTab('tab-apps', this)">Полезные функции</button>
            <button class="tab-btn" onclick="switchTab('tab-global', this)">Настройки</button>
        </div>
        
        <div class="content">
            <div id="tab-settings" class="tab-content active">
                <h1>Настройки бота</h1>
                <p style="color: var(--text-muted);">Здесь будет панель управления командами и модерацией.</p>
            </div>

            <div id="tab-apps" class="tab-content">
                <h1>Хаб приложений</h1>
                <div class="tiles-grid" id="apps-container"></div>
            </div>

            <div id="tab-global" class="tab-content">
                <h1>Глобальные настройки</h1>
                <p style="color: var(--text-muted);">Интерфейс, привязки аккаунтов и API.</p>
            </div>
        </div>
    </div>

    <script>
        // Твой Client ID уже вставлен
        const TWITCH_CLIENT_ID = 'n71zv0v6u6l5uxc50toagqd87a1n7z'; 
        const REDIRECT_URI = window.location.href.split('#')[0]; 

        function loginWithTwitch() {
            if (!TWITCH_CLIENT_ID) {
                alert("Ошибка: Client ID не найден!");
                return;
            }
            const authUrl = `https://id.twitch.tv/oauth2/authorize?client_id=${TWITCH_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=user:read:email`;
            window.location.href = authUrl;
        }

        function checkTwitchAuth() {
            const hash = window.location.hash;
            if (hash.includes('access_token')) {
                document.getElementById('screen-login').classList.remove('active-screen');
                document.getElementById('screen-welcome').classList.add('active-screen');

                const urlParams = new URLSearchParams(hash.replace('#', '?'));
                const accessToken = urlParams.get('access_token');
                
                fetch('https://api.twitch.tv/helix/users', {
                    headers: {
                        'Client-ID': TWITCH_CLIENT_ID,
                        'Authorization': `Bearer ${accessToken}`
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.data && data.data.length > 0) {
                        const username = data.data[0].display_name;
                        document.getElementById('welcome-name').innerText = `Привет, ${username}!`;
                    }
                })
                .catch(error => {
                    console.error('Ошибка API Twitch:', error);
                    document.getElementById('welcome-name').innerText = `Привет, домик!`;
                });

                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        window.onload = checkTwitchAuth;

        const apps = [
            "Chat Quiz", "Twitch City", "Chat vs Boss", "Song Battle", "AI Roast", "Bomb Defuse",
            "Поле Чудес", "Guess Word", "Chat Fishing", "Coin Flip", "Pixel Battle", "Кликер",
            "Контекст", "Словотрон", "Track Queue", "Аукцион", "Giveaway", "OBS Timer",
            "First Message", "Custom Chat", "Нить", "Доска почёта", "Гляделки", "ГеоБитва",
            "Скорость реакции", "Флаги", "Виселица", "Анбан LIVE", "Telegram", "Доксинг",
            "Стихи из чата", "Смехлист", "Gartic Show"
        ];

        const appsContainer = document.getElementById('apps-container');
        apps.forEach(app => {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.innerHTML = `<i>✧</i><span>${app}</span>`;
            appsContainer.appendChild(tile);
        });

        function goToDashboard() {
            const left = document.getElementById('welcome-left');
            const right = document.getElementById('welcome-right');
            
            left.classList.add('slide-left');
            right.classList.add('slide-right');

            setTimeout(() => {
                document.getElementById('screen-welcome').classList.remove('active-screen');
                document.getElementById('dashboard').style.display = 'flex';
            }, 800);
        }

        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }
    </script>
</body>
</html>
