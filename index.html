<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DomikBot - Панель стримера</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #09090b;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --glass-bg: rgba(24, 24, 27, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #9146FF;
            --giveaway-accent: #f5a623;
            --twitch-color: #9146FF;
        }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Стили для структуры */
        #main-dashboard { display: none; width: 100vw; height: 100vh; display: flex; }
        .sidebar { width: 280px; background: var(--glass-bg); backdrop-filter: blur(20px); border-right: 1px solid var(--glass-border); padding: 30px 20px; display: flex; flex-direction: column; gap: 10px; }
        .content { flex: 1; padding: 40px; overflow-y: auto; }
        
        .tab-btn { background: transparent; border: 1px solid transparent; color: var(--text-muted); padding: 14px; border-radius: 12px; cursor: pointer; text-align: left; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: rgba(145, 70, 255, 0.15); color: #fff; }
        .logout-btn { margin-top: auto; color: #ef4444; }

        /* Скрываем всё, кроме инструментов */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <!-- Экран авторизации (упрощенный) -->
    <div id="login-page">
        <button onclick="loginWithTwitch()">Войти через Twitch</button>
    </div>

    <!-- Панель управления -->
    <div id="main-dashboard">
        <div class="sidebar">
            <h2>DomikBot</h2>
            <div id="user-profile"></div>
            <button class="tab-btn active" onclick="switchTab('tab-hub', this)">🧩 Хаб приложений</button>
            <button class="tab-btn" onclick="switchTab('tab-giveaway', this)">🎁 Giveaway</button>
            <button class="tab-btn logout-btn" onclick="logout()">🚪 Выйти</button>
        </div>
        
        <div class="content">
            <div id="tab-hub" class="tab-content active">
                <h1>Хаб приложений</h1>
                <!-- Сетка приложений -->
            </div>
            <div id="tab-giveaway" class="tab-content">
                <h1>Giveaway</h1>
                <!-- Модуль розыгрыша -->
            </div>
        </div>
    </div>

    <script>
        const TWITCH_CLIENT_ID = 'n71zv0v6u6l5uxc50toagqd87a1n7z';
        
        function loginWithTwitch() {
            window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${TWITCH_CLIENT_ID}&redirect_uri=${window.location.origin}&response_type=token&scope=chat:read chat:edit`;
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        // Логика инициализации при загрузке
        window.onload = () => {
            // Если есть токен в URL, сохраняем его
            const hash = window.location.hash.substring(1);
            if (hash.includes('access_token')) {
                const params = new URLSearchParams(hash);
                localStorage.setItem('token', params.get('access_token'));
                window.location.hash = '';
            }
            
            if (localStorage.getItem('token')) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('main-dashboard').style.display = 'flex';
            }
        };
    </script>
</body>
</html>
