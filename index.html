<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DomikBot Control Panel</title>
    <style>
        :root {
            --bg: #0f172a;
            --sidebar: #1e293b;
            --accent: #6366f1;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; }

        /* Радужный эффект для заголовков */
        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        .rainbow-text { animation: rainbow 5s linear infinite; background: linear-gradient(90deg, #ff0080, #ff8c00, #40e0d0); -webkit-background-clip: text; color: transparent; font-weight: bold; }

        /* Левая панель */
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid rgba(255,255,255,0.1); padding: 20px; display: flex; flex-direction: column; }
        .nav-link { display: block; padding: 15px; margin-bottom: 10px; background: var(--glass); border-radius: 12px; color: #cbd5e1; text-decoration: none; transition: 0.3s; }
        .nav-link:hover { background: var(--accent); color: white; transform: translateX(5px); }

        /* Контент */
        .main { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .hub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; margin-top: 30px; }
        .app-card { background: var(--glass); padding: 20px; border-radius: 20px; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .app-card:hover { background: var(--accent); transform: translateY(-5px); }
        .icon { font-size: 30px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 class="rainbow-text">DomikBot</h2>
        <div style="flex-grow: 1;">
            <a href="#" class="nav-link">💬 Команды</a>
            <a href="#" class="nav-link">📢 Таймеры</a>
            <a href="#" class="nav-link">🧩 Хаб приложений</a>
        </div>
        <button class="nav-link" style="border:none; cursor:pointer; background: #991b1b; color: white;" onclick="logout()">Выход</button>
    </div>

    <div class="main">
        <h1 id="welcome">Добро пожаловать</h1>
        <p>Выберите приложение для управления вашим каналом.</p>
        
        <div class="hub-grid">
            <!-- Пример: все ваши 33 приложения -->
            <div class="app-card" onclick="window.location.href='https://domikxdx.github.io/Domikbot/giveway'">
                <div class="icon">🎁</div><div>Giveaway</div>
            </div>
            <div class="app-card" onclick="window.location.href='https://domikxdx.github.io/Domikbot/chat-quiz'">
                <div class="icon">💬</div><div>Chat Quiz</div>
            </div>
            <!-- Вставьте сюда остальные 31 приложение по аналогии -->
        </div>
    </div>

    <script>
        // Простая логика приветствия
        const token = localStorage.getItem('twitch_token');
        if(!token) { /* Тут логика перенаправления на логин */ }
        
        function logout() { localStorage.removeItem('twitch_token'); window.location.reload(); }
    </script>
</body>
</html>
