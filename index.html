<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DomikBot - Панель управления</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --bg-color: #09090b;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --glass-bg: rgba(24, 24, 27, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #9146FF;
            --giveaway-accent: #f5a623;
            --giveaway-btn-bg: linear-gradient(135deg, #f5a623, #f08c14);
            --twitch-color: #9146FF;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 15% 50%, rgba(145, 70, 255, 0.03), transparent 25%);
        }

        /* === СТИЛИ ВСТРЕЧАЮЩЕЙ СТРАНИЦЫ === */
        #login-page { display: none; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; z-index: 1000; background: var(--bg-color); }
        .login-left { flex: 1.2; display: flex; flex-direction: column; justify-content: center; padding: 0 80px; background: radial-gradient(circle at 0% 50%, rgba(145, 70, 255, 0.12), transparent 50%); border-right: 1px solid var(--glass-border); }
        .login-left h1 { font-size: 3.5rem; font-weight: 800; line-height: 1.1; margin: 0 0 20px 0; letter-spacing: -2px; background: linear-gradient(to right, #fff, #a1a1aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-left h1 span { color: var(--accent); -webkit-text-fill-color: initial; }
        .login-left p { font-size: 1.3rem; color: var(--text-muted); margin: 0; font-weight: 400; }
        
        .login-right { flex: 0.8; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #0c0c0e; }
        .login-card { width: 360px; padding: 40px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 24px; text-align: center; backdrop-filter: blur(10px); }
        .twitch-btn { width: 100%; background: var(--twitch-color); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: all 0.2s; box-shadow: 0 8px 24px rgba(145, 70, 255, 0.25); }
        
        /* === СТИЛИ АДМИНКИ === */
        #main-dashboard { display: none; width: 100vw; height: 100vh; }
        .sidebar { width: 280px; background: var(--glass-bg); backdrop-filter: blur(20px); border-right: 1px solid var(--glass-border); padding: 30px 20px; display: flex; flex-direction: column; gap: 5px; z-index: 10; }
        .user-profile { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 14px; border: 1px solid var(--glass-border); margin-bottom: 20px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #27272a; object-fit: cover; }
        .tab-btn { background: transparent; border: 1px solid transparent; color: var(--text-muted); font-size: 0.95rem; font-weight: 600; text-align: left; cursor: pointer; padding: 14px 18px; border-radius: 12px; transition: all 0.3s; display: flex; align-items: center; gap: 10px; }
        .tab-btn.active { background: rgba(145, 70, 255, 0.15); border: 1px solid rgba(145, 70, 255, 0.3); color: #fff; }
        .logout-btn { margin-top: auto; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }

        .content { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; position: relative; }
        .tab-content { display: none; flex: 1; }
        .tab-content.active { display: flex; flex-direction: column; }
        
        /* GIVEAWAY МОДУЛЬ */
        .gv-container { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; width: 100%; max-width: 750px; margin: 0 auto; text-align: center; }
        .gv-card { background: rgba(20, 20, 23, 0.85); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 30px; width: 100%; box-sizing: border-box; }
        .btn-start-gv { background: var(--giveaway-btn-bg); color: #000; width: 100%; border: none; padding: 16px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .gv-user-badge { background: #b22222; color: #fff; font-weight: 700; padding: 6px 14px; border-radius: 6px; margin: 5px; display: inline-block; }
        .gv-console-log { background: #0c0c0e; border: 1px solid rgba(255,255,255,0.04); border-radius: 12px; padding: 16px; font-family: monospace; font-size: 0.85rem; color: #666; height: 150px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-left">
            <h1><span>Domik_Bot</span><br>самый удобный чат бот на твиче</h1>
        </div>
        <div class="login-right">
            <div class="login-card">
                <button class="twitch-btn" onclick="loginWithTwitch()">Войти через Twitch</button>
            </div>
        </div>
    </div>

    <div id="main-dashboard">
        <div class="sidebar">
            <h2>DomikBot</h2>
            <div class="user-profile">
                <img src="" id="user-avatar" class="user-avatar" alt="Avatar">
                <div class="user-info">
                    <span id="user-name" class="user-name">Загрузка...</span>
                </div>
            </div>
            <button class="tab-btn active" onclick="switchTab('tab-commands', this)">💬 Чат-Команды</button>
            <button class="tab-btn" onclick="switchTab('tab-hub', this)">🧩 Хаб приложений</button>
            <button class="tab-btn logout-btn" onclick="logout()">🚪 Выйти</button>
        </div>
        
        <div class="content">
            <div id="tab-commands" class="tab-content active">
                <h1>Управление командами</h1>
                <!-- Контент команд -->
            </div>

            <div id="tab-hub" class="tab-content">
                <h1>Хаб приложений</h1>
                <div class="app-item" onclick="openGiveawayApp()">🎁 Giveaway</div>
            </div>

            <div id="tab-giveaway" class="tab-content">
                <div class="gv-container">
                    <div id="gv-screen-setup" class="gv-card">
                        <input type="text" id="gv-keyword" value="+">
                        <button class="btn-start-gv" onclick="startGiveawayCollection()">Начать сбор</button>
                    </div>
                    <div id="gv-screen-live" class="gv-card" style="display: none;">
                        <button id="btn-pick-winner" onclick="pickGiveawayWinner()">Выбрать победителя</button>
                        <div id="gv-users-container"></div>
                        <div class="gv-console-log" id="gv-console"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TWITCH_CLIENT_ID = 'n71zv0v6u6l5uxc50toagqd87a1n7z'; 
        const socket = io('http://localhost:3000');
        let registeredUsers = new Set();
        let giveawayActive = false;
        let giveawayWinner = null;

        socket.on('chatMessage', (data) => {
            if (giveawayActive && data.message.trim() === document.getElementById('gv-keyword').value) {
                registeredUsers.add(data.user);
                document.getElementById('gv-users-container').innerHTML += `<div class="gv-user-badge">${data.user}</div>`;
                playNotificationSound();
            }
        });

        function playNotificationSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            osc.connect(ctx.destination);
            osc.start(); osc.stop(0.2);
        }

        function loginWithTwitch() {
            window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${TWITCH_CLIENT_ID}&redirect_uri=${window.location.origin}&response_type=token&scope=chat:read`;
        }

        function logout() {
            localStorage.clear();
            window.location.reload();
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        function openGiveawayApp() {
            switchTab('tab-giveaway');
        }

        function startGiveawayCollection() {
            giveawayActive = true;
            document.getElementById('gv-screen-setup').style.display = 'none';
            document.getElementById('gv-screen-live').style.display = 'block';
        }

        function pickGiveawayWinner() {
            const users = Array.from(registeredUsers);
            giveawayWinner = users[Math.floor(Math.random() * users.length)];
            alert('Победитель: ' + giveawayWinner);
        }

        window.onload = () => {
            if (localStorage.getItem('domik_bot_logged_in')) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('main-dashboard').style.display = 'flex';
            } else {
                document.getElementById('login-page').style.display = 'flex';
            }
        };
    </script>
</body>
</html>
